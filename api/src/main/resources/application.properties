server.port=3000

# Actuator - expose prometheus endpoint
management.endpoints.web.exposure.include=prometheus,health,info,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Application info
spring.application.name=todo-api
info.app.name=Todo Monitoring API
info.app.version=1.0.0
info.app.description=REST API with Prometheus metrics for monitoring demo

# Logging
logging.level.com.monitoring=INFO
